name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: playwright install

    - name: Validate secrets
      run: python utils/secret_manager.py validate
      env:
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        FAKESTORE_API_KEY: ${{ secrets.FAKESTORE_API_KEY }}

    - name: Run smoke tests
      run: python -m pytest tests/test_smoke.py -v
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        BROWSER: ${{ secrets.BROWSER }}
        HEADLESS: ${{ secrets.HEADLESS }}
        ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
        LOG_LEVEL: ${{ secrets.LOG_LEVEL }}

    - name: Run API tests
      run: python -m pytest tests/api/ -v --tb=short
      env:
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        INVALID_USER_EMAIL: ${{ secrets.INVALID_USER_EMAIL }}
        INVALID_USER_PASSWORD: ${{ secrets.INVALID_USER_PASSWORD }}
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
        AUTH_API_BASE_URL: ${{ secrets.AUTH_API_BASE_URL }}
        STORE_API_BASE_URL: ${{ secrets.STORE_API_BASE_URL }}
        REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        FAKESTORE_API_KEY: ${{ secrets.FAKESTORE_API_KEY }}
        API_TIMEOUT: ${{ secrets.API_TIMEOUT }}
        MAX_RETRIES: ${{ secrets.MAX_RETRIES }}

    - name: Run UI tests
      run: python -m pytest tests/ui/ -v --tb=short
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        BROWSER: ${{ secrets.BROWSER }}
        HEADLESS: ${{ secrets.HEADLESS }}
        VALID_USERNAME: ${{ secrets.VALID_USERNAME }}
        VALID_PASSWORD: ${{ secrets.VALID_PASSWORD }}
        INVALID_USERNAME: ${{ secrets.INVALID_USERNAME }}
        INVALID_PASSWORD: ${{ secrets.INVALID_PASSWORD }}

    - name: Run E2E tests
      run: python -m pytest tests/e2e/ -v --tb=short
      env:
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
        AUTH_API_BASE_URL: ${{ secrets.AUTH_API_BASE_URL }}
        STORE_API_BASE_URL: ${{ secrets.STORE_API_BASE_URL }}
        BASE_URL: ${{ secrets.BASE_URL }}
        BROWSER: ${{ secrets.BROWSER }}
        HEADLESS: ${{ secrets.HEADLESS }}

    - name: Generate test report
      run: python -m pytest --html=reports/test_report.html --self-contained-html
      env:
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        BASE_URL: ${{ secrets.BASE_URL }}
        BROWSER: ${{ secrets.BROWSER }}
        HEADLESS: ${{ secrets.HEADLESS }}
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
        AUTH_API_BASE_URL: ${{ secrets.AUTH_API_BASE_URL }}
        STORE_API_BASE_URL: ${{ secrets.STORE_API_BASE_URL }}
        VALID_USERNAME: ${{ secrets.VALID_USERNAME }}
        VALID_PASSWORD: ${{ secrets.VALID_PASSWORD }}
        INVALID_USER_EMAIL: ${{ secrets.INVALID_USER_EMAIL }}
        INVALID_USER_PASSWORD: ${{ secrets.INVALID_USER_PASSWORD }}
        INVALID_USERNAME: ${{ secrets.INVALID_USERNAME }}
        INVALID_PASSWORD: ${{ secrets.INVALID_PASSWORD }}
        REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        FAKESTORE_API_KEY: ${{ secrets.FAKESTORE_API_KEY }}
        ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
        LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
        API_TIMEOUT: ${{ secrets.API_TIMEOUT }}
        MAX_RETRIES: ${{ secrets.MAX_RETRIES }}

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: reports/
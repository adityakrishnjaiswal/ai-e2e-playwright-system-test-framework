name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: playwright install

    - name: Run smoke test
      run: pytest tests/test_smoke.py -v

    - name: Run API tests
      run: pytest tests/api/ -v --tb=short --html=reports/api-report.html --self-contained-html

    - name: Run UI tests
      run: pytest tests/ui/ -v --tb=short --html=reports/ui-report.html --self-contained-html
      env:
        HEADLESS: true

    - name: Run E2E tests
      run: pytest -m e2e -v --tb=short --html=reports/e2e-report.html --self-contained-html

    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: reports/
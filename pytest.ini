[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --html=reports/report.html --self-contained-html -n auto --strict-markers
markers =
    ui: marks tests as UI tests
    api: marks tests as API tests
    e2e: marks tests as end-to-end tests